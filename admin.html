<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Admin — Project Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f2f2f2; color: #111; font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Toolbar ── */
.toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; background: #111; color: #fff;
    flex-shrink: 0;
}
.toolbar-title { font-weight: 600; font-size: 15px; margin-right: auto; }
.toolbar select {
    padding: 7px 12px; border-radius: 6px; border: none;
    background: #2a2a2a; color: #fff; font-size: 13px;
    font-family: inherit; cursor: pointer; min-width: 200px;
}
.btn-toolbar {
    padding: 8px 16px; border-radius: 6px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
}
.btn-toolbar:hover { opacity: 0.8; }
.btn-new  { background: #2a2a2a; color: #fff; }
.btn-del  { background: #5a1a1a; color: #fff; }
.btn-save { background: #66d4b4; color: #111; }

/* ── Main layout ── */
.editor-layout {
    display: grid; grid-template-columns: 420px 1fr;
    flex: 1; overflow: hidden;
}

/* ── Form panel ── */
.form-panel {
    background: #fff; border-right: 1px solid #e0e0e0;
    overflow-y: auto; padding: 24px;
}
.form-section { margin-bottom: 28px; }
.form-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #888; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid #f0f0f0;
}
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
.field input, .field textarea, .field select {
    width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0;
    border-radius: 6px; font-family: inherit; font-size: 13px;
    color: #111; background: #fafafa; transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus { outline: none; border-color: #66d4b4; background: #fff; }
.field textarea { resize: vertical; min-height: 72px; }
.screenshot-row { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
.screenshot-row .field { margin-bottom: 8px; }
.screenshot-row .field:last-child { margin-bottom: 0; }
.field small { display: block; margin-top: 4px; font-size: 11px; color: #aaa; }
.upload-row { display: flex; gap: 8px; align-items: center; }
.upload-row input[type=text] { flex: 1; }
.btn-upload {
    padding: 8px 12px; border-radius: 6px; border: 1px solid #e0e0e0;
    background: #fafafa; font-family: inherit; font-size: 12px;
    cursor: pointer; white-space: nowrap; color: #555;
    transition: background 0.15s;
}
.btn-upload:hover { background: #f0f0f0; }
.status-bar {
    position: sticky; bottom: 0;
    padding: 10px 12px; border-radius: 6px;
    font-size: 13px; display: none;
    z-index: 20; margin-top: 16px;
}
.status-bar.success { background: #e8faf5; color: #0a7a5a; display: block; border: 1px solid #a8e8d4; }
.status-bar.error   { background: #fde8e8; color: #a00; display: block; border: 1px solid #f5b8b8; }
.upload-preview { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid #e0e0e0; display: none; flex-shrink: 0; }
.upload-preview.visible { display: block; }
.lang-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.lang-tab { padding: 5px 14px; border-radius: 4px; border: 1px solid #e0e0e0; background: #fafafa; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; color: #888; transition: all 0.15s; }
.lang-tab.active { background: #111; color: #fff; border-color: #111; }
.lang-fields { display: none; }
.lang-fields.active { display: block; }

/* ── Preview panel ── */
.preview-panel {
    overflow-y: auto; background: #fff;
    padding: 0;
}
.preview-label {
    position: sticky; top: 0; z-index: 10;
    background: #f9f9f9; border-bottom: 1px solid #e8e8e8;
    padding: 8px 20px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: #999;
}

/* ── Preview styles (mirrors case-study.css) ── */
@font-face { font-family: 'PolySans Bulky'; src: url('polysans-font-family/polysanstrial-bulky.otf') format('opentype'); font-display: block; }
@font-face { font-family: 'PolySans Median'; src: url('polysans-font-family/polysanstrial-median.otf') format('opentype'); font-display: block; }
@font-face { font-family: 'PolySans Neutral Mono'; src: url('polysans-font-family/polysanstrial-neutralmono.otf') format('opentype'); font-display: block; }

.pv-hero { width: 100%; aspect-ratio: 16/7; overflow: hidden; background: #141414; }
.pv-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pv-body { max-width: 860px; margin: 0 auto; padding: 48px 32px 80px; }
.pv-tag { font-family: 'PolySans Neutral Mono', monospace; font-size: 12px; color: rgba(0,0,0,0.4); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 12px; }
.pv-title { font-family: 'PolySans Bulky', sans-serif; font-size: 36px; font-weight: normal; line-height: 1.15; color: #000; margin-bottom: 24px; }
.pv-overview { font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.8; color: rgba(0,0,0,0.7); max-width: 640px; }
.pv-divider { border: none; border-top: 0.5px solid #d4d4d4; margin: 48px 0; }
.pv-screenshots { display: flex; flex-direction: column; gap: 28px; }
.pv-screenshot-item img { width: 100%; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); display: block; }
.pv-caption { font-family: 'DM Sans', sans-serif; font-size: 13px; color: rgba(0,0,0,0.45); margin-top: 8px; }
.pv-outcome-label { font-family: 'PolySans Median', sans-serif; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: #000; display: block; margin-bottom: 12px; }
.pv-outcome-text { font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.8; color: rgba(0,0,0,0.7); }
.pv-empty { color: #ccc; font-style: italic; font-size: 13px; }
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar">
    <span class="toolbar-title">Zenith Admin — Project Editor</span>
    <select id="projectSelect" onchange="loadProject(this.value)"></select>
    <button class="btn-toolbar btn-new" onclick="newProject()">+ New Project</button>
    <button class="btn-toolbar btn-del" onclick="deleteProject()">Delete</button>
    <button class="btn-toolbar btn-save" onclick="saveAll()">Save ✓</button>
</div>

<!-- ── Editor layout ── -->
<div class="editor-layout">

    <!-- Form panel -->
    <div class="form-panel">
        <div class="form-section">
            <div class="form-section-title">Project Info</div>
            <div class="field">
                <label>ID (used in URL — no spaces, lowercase)</label>
                <input type="text" id="f-id" placeholder="e.g. tire-rex" oninput="syncPreview()">
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Content</div>
            <div class="lang-tabs">
                <button class="lang-tab active" data-lang="en" onclick="switchAdminLang('en')">EN</button>
                <button class="lang-tab" data-lang="zh" onclick="switchAdminLang('zh')">ZH</button>
                <button class="lang-tab" data-lang="ja" onclick="switchAdminLang('ja')">JA</button>
            </div>
            <!-- EN fields -->
            <div class="lang-fields active" data-lang="en">
                <div class="field"><label>Tag / Category</label><input type="text" id="f-tag" placeholder="e.g. UI/UX Design" oninput="syncPreview()"></div>
                <div class="field"><label>Project Title</label><input type="text" id="f-title" placeholder="e.g. Tire Rex Company Website" oninput="syncPreview()"></div>
                <div class="field"><label>Card Description <span style="font-weight:400;color:#aaa">(homepage card — 1 sentence)</span></label><input type="text" id="f-card-desc" placeholder="e.g. App design for live poker event management." oninput="syncPreview()"></div>
                <div class="field"><label>Overview <span style="font-weight:400;color:#aaa">(case study page — double Enter for new paragraph)</span></label><textarea id="f-overview" rows="10" placeholder="Describe the project and its goal..." oninput="syncPreview()"></textarea></div>
                <div class="field"><label>Outcome</label><textarea id="f-outcome" rows="3" placeholder="What changed after this project?" oninput="syncPreview()"></textarea></div>
            </div>
            <!-- ZH fields -->
            <div class="lang-fields" data-lang="zh">
                <div class="field"><label>Tag / Category (中文)</label><input type="text" id="f-tag-zh" placeholder="如：UI/UX 设计" oninput="syncPreview()"></div>
                <div class="field"><label>Project Title (中文)</label><input type="text" id="f-title-zh" placeholder="项目标题" oninput="syncPreview()"></div>
                <div class="field"><label>Card Description (中文)</label><input type="text" id="f-card-desc-zh" placeholder="首页卡片上的简短描述" oninput="syncPreview()"></div>
                <div class="field"><label>Overview (中文)</label><textarea id="f-overview-zh" rows="10" placeholder="用中文描述项目目标..." oninput="syncPreview()"></textarea></div>
                <div class="field"><label>Outcome (中文)</label><textarea id="f-outcome-zh" rows="3" placeholder="项目成果" oninput="syncPreview()"></textarea></div>
            </div>
            <!-- JA fields -->
            <div class="lang-fields" data-lang="ja">
                <div class="field"><label>Tag / Category (日本語)</label><input type="text" id="f-tag-ja" placeholder="例：UI/UX デザイン" oninput="syncPreview()"></div>
                <div class="field"><label>Project Title (日本語)</label><input type="text" id="f-title-ja" placeholder="プロジェクトタイトル" oninput="syncPreview()"></div>
                <div class="field"><label>Card Description (日本語)</label><input type="text" id="f-card-desc-ja" placeholder="ホームページのカードに表示される説明" oninput="syncPreview()"></div>
                <div class="field"><label>Overview (日本語)</label><textarea id="f-overview-ja" rows="10" placeholder="プロジェクトについて日本語で説明..." oninput="syncPreview()"></textarea></div>
                <div class="field"><label>Outcome (日本語)</label><textarea id="f-outcome-ja" rows="3" placeholder="プロジェクトの成果" oninput="syncPreview()"></textarea></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Images</div>
            <div class="field">
                <label>Homepage card image <span style="font-weight:400;color:#aaa">(1200×1254px recommended)</span></label>
                <div class="upload-row">
                    <input type="text" id="f-cover" placeholder="images/projects/my-cover.png" oninput="syncPreview()">
                    <button class="btn-upload" onclick="triggerUpload('f-cover')">Upload</button>
                    <img id="f-cover-preview" class="upload-preview" alt="">
                </div>
                <small>Shown on the homepage Works card.</small>
            </div>
            <div class="field">
                <label>Case study hero image <span style="font-weight:400;color:#aaa">(1440×630px recommended)</span></label>
                <div class="upload-row">
                    <input type="text" id="f-hero" placeholder="images/projects/my-hero.png" oninput="syncPreview()">
                    <button class="btn-upload" onclick="triggerUpload('f-hero')">Upload</button>
                    <img id="f-hero-preview" class="upload-preview" alt="">
                </div>
                <small>Shown at the top of the case study subpage. Leave blank to use the card image.</small>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleUpload(event)">
        </div>

        <div class="form-section">
            <div class="form-section-title">Screenshots (up to 5)</div>
            <div id="screenshots-list"></div>
            <button onclick="addScreenshot()" style="margin-top:8px;padding:7px 14px;border:1px dashed #ccc;background:none;border-radius:6px;cursor:pointer;font-size:12px;color:#888;">+ Add Screenshot</button>
        </div>

        <div id="status-bar" class="status-bar"></div>
    </div>

    <!-- Preview panel -->
    <div class="preview-panel">
        <div class="preview-label">Live Preview</div>
        <div id="preview-content"></div>
    </div>

</div>

<script src="projects.js"></script>
<script>
let projects = JSON.parse(JSON.stringify(window.PROJECTS || []));
let currentId = projects.length ? projects[0].id : null;

function switchAdminLang(lang) {
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
    document.querySelectorAll('.lang-fields').forEach(f => f.classList.toggle('active', f.dataset.lang === lang));
}

// ── Initialise ──────────────────────────────────────────────────────────────

function init() {
    rebuildSelect();
    if (currentId) loadProject(currentId);
    else syncPreview();
}

function rebuildSelect() {
    const sel = document.getElementById('projectSelect');
    sel.innerHTML = projects.map(p =>
        `<option value="${p.id}" ${p.id === currentId ? 'selected' : ''}>${p.title || p.id}</option>`
    ).join('');
}

// ── Load / New / Delete ─────────────────────────────────────────────────────

function loadProject(id) {
    currentId = id;
    const p = projects.find(p => p.id === id);
    if (!p) return;
    switchAdminLang('en');
    document.getElementById('f-id').value        = p.id        || '';
    document.getElementById('f-tag').value       = p.tag       || '';
    document.getElementById('f-title').value     = p.title     || '';
    document.getElementById('f-card-desc').value = p.cardDesc  || '';
    document.getElementById('f-overview').value  = p.overview  || '';
    document.getElementById('f-cover').value     = p.coverImage || '';
    document.getElementById('f-hero').value      = p.heroImage  || '';
    const coverPrev = document.getElementById('f-cover-preview');
    if (coverPrev) { coverPrev.src = p.coverImage || ''; coverPrev.classList.toggle('visible', !!p.coverImage); }
    const heroPrev = document.getElementById('f-hero-preview');
    if (heroPrev) { heroPrev.src = p.heroImage || ''; heroPrev.classList.toggle('visible', !!p.heroImage); }
    document.getElementById('f-outcome').value       = p.outcome      || '';
    document.getElementById('f-tag-zh').value        = p.tag_zh        || '';
    document.getElementById('f-title-zh').value      = p.title_zh      || '';
    document.getElementById('f-card-desc-zh').value  = p.cardDesc_zh   || '';
    document.getElementById('f-overview-zh').value   = p.overview_zh   || '';
    document.getElementById('f-outcome-zh').value    = p.outcome_zh    || '';
    document.getElementById('f-tag-ja').value        = p.tag_ja        || '';
    document.getElementById('f-title-ja').value      = p.title_ja      || '';
    document.getElementById('f-card-desc-ja').value  = p.cardDesc_ja   || '';
    document.getElementById('f-overview-ja').value   = p.overview_ja   || '';
    document.getElementById('f-outcome-ja').value    = p.outcome_ja    || '';
    rebuildScreenshotFields(p.screenshots || [], p.captions || [], p.captions_zh || [], p.captions_ja || []);
    syncPreview();
}

function newProject() {
    const id = 'new-project-' + Date.now();
    projects.push({ id, tag: '', title: 'New Project', overview: '', coverImage: '', screenshots: [], captions: [], captions_zh: [], captions_ja: [], outcome: '', tag_zh: '', title_zh: '', cardDesc_zh: '', overview_zh: '', outcome_zh: '', tag_ja: '', title_ja: '', cardDesc_ja: '', overview_ja: '', outcome_ja: '' });
    currentId = id;
    rebuildSelect();
    loadProject(id);
}

function deleteProject() {
    if (projects.length <= 1) { showStatus('Cannot delete the last project.', 'error'); return; }
    if (!confirm('Delete this project?')) return;
    projects = projects.filter(p => p.id !== currentId);
    currentId = projects[0].id;
    rebuildSelect();
    loadProject(currentId);
}

// ── Screenshots ─────────────────────────────────────────────────────────────

function rebuildScreenshotFields(screenshots, captions, captions_zh, captions_ja) {
    const list = document.getElementById('screenshots-list');
    list.innerHTML = '';
    screenshots.forEach((src, i) => addScreenshotRow(src, captions[i] || '', (captions_zh || [])[i] || '', (captions_ja || [])[i] || ''));
}

function addScreenshot() {
    if (document.querySelectorAll('.ss-row').length >= 5) {
        showStatus('Maximum 5 screenshots per project.', 'error'); return;
    }
    addScreenshotRow('', '', '', '');
    syncPreview();
}

function addScreenshotRow(src, caption, caption_zh, caption_ja) {
    const i = document.querySelectorAll('.ss-row').length;
    const srcId = 'ss-src-' + i;
    const prevId = 'ss-prev-' + i;
    const row = document.createElement('div');
    row.className = 'screenshot-row ss-row';
    row.innerHTML = `
        <div class="field">
            <label>Screenshot ${i + 1}</label>
            <div class="upload-row">
                <input type="text" id="${srcId}" class="ss-src" value="${src}" placeholder="images/projects/screen-${i+1}.png" oninput="syncPreview()">
                <button class="btn-upload" onclick="triggerUpload('${srcId}')">Upload</button>
                <img id="${prevId}" class="upload-preview${src ? ' visible' : ''}" src="${src}" alt="">
            </div>
        </div>
        <div class="field lang-fields active" data-lang="en">
            <label>Caption (EN)</label>
            <input type="text" class="ss-cap ss-cap-en" value="${caption || ''}" placeholder="Short description" oninput="syncPreview()">
        </div>
        <div class="field lang-fields" data-lang="zh">
            <label>Caption (中文)</label>
            <input type="text" class="ss-cap-zh" value="${caption_zh || ''}" placeholder="简短描述">
        </div>
        <div class="field lang-fields" data-lang="ja">
            <label>Caption (日本語)</label>
            <input type="text" class="ss-cap-ja" value="${caption_ja || ''}" placeholder="短い説明">
        </div>`;
    document.getElementById('screenshots-list').appendChild(row);
}

// ── Sync current form → projects array ──────────────────────────────────────

function readForm() {
    const ssRows = document.querySelectorAll('.ss-row');
    const screenshots = [], captions = [], captions_zh = [], captions_ja = [];
    ssRows.forEach(row => {
        const src = row.querySelector('.ss-src').value.trim();
        if (src) {
            screenshots.push(src);
            captions.push(row.querySelector('.ss-cap-en').value.trim());
            captions_zh.push(row.querySelector('.ss-cap-zh').value.trim());
            captions_ja.push(row.querySelector('.ss-cap-ja').value.trim());
        }
    });
    return {
        id:           document.getElementById('f-id').value.trim().replace(/\s+/g, '-').toLowerCase(),
        tag:          document.getElementById('f-tag').value.trim(),
        title:        document.getElementById('f-title').value.trim(),
        cardDesc:     document.getElementById('f-card-desc').value.trim(),
        overview:     document.getElementById('f-overview').value.trim(),
        coverImage:   document.getElementById('f-cover').value.trim(),
        heroImage:    document.getElementById('f-hero').value.trim() || undefined,
        outcome:      document.getElementById('f-outcome').value.trim(),
        tag_zh:       document.getElementById('f-tag-zh').value.trim(),
        title_zh:     document.getElementById('f-title-zh').value.trim(),
        cardDesc_zh:  document.getElementById('f-card-desc-zh').value.trim(),
        overview_zh:  document.getElementById('f-overview-zh').value.trim(),
        outcome_zh:   document.getElementById('f-outcome-zh').value.trim(),
        tag_ja:       document.getElementById('f-tag-ja').value.trim(),
        title_ja:     document.getElementById('f-title-ja').value.trim(),
        cardDesc_ja:  document.getElementById('f-card-desc-ja').value.trim(),
        overview_ja:  document.getElementById('f-overview-ja').value.trim(),
        outcome_ja:   document.getElementById('f-outcome-ja').value.trim(),
        screenshots, captions, captions_zh, captions_ja
    };
}

function renderParagraphs(text) {
    if (!text) return '';
    return text.split(/\n\n+/).map(p => '<p class="pv-overview">' + p.replace(/\n/g, '<br>') + '</p>').join('');
}

function syncPreview() {
    const p = readForm();
    const previewDiv = document.getElementById('preview-content');
    const screenshotsHtml = p.screenshots.map((src, i) => `
        <div class="pv-screenshot-item">
            <img src="${src}" alt="" onerror="this.style.display='none'">
            ${p.captions[i] ? `<p class="pv-caption">${p.captions[i]}</p>` : ''}
        </div>`).join('');

    previewDiv.innerHTML = `
        ${p.heroImage ? `<div class="pv-hero"><img src="${p.heroImage}" alt=""></div>` : ''}
        <div class="pv-body">
            <span class="pv-tag">${p.tag || '<span class="pv-empty">tag</span>'}</span>
            <h1 class="pv-title">${p.title || '<span class="pv-empty">Project Title</span>'}</h1>
            ${renderParagraphs(p.overview) || '<p class="pv-overview pv-empty">Overview text will appear here...</p>'}
            <hr class="pv-divider">
            <div class="pv-screenshots">
                ${screenshotsHtml || '<p class="pv-empty">Screenshots will appear here once you add image paths.</p>'}
            </div>
            ${p.outcome ? `<hr class="pv-divider"><span class="pv-outcome-label">Outcome</span><p class="pv-outcome-text">${p.outcome}</p>` : ''}
        </div>`;
}

// ── Save ─────────────────────────────────────────────────────────────────────

function saveAll() {
    const updated = readForm();
    const idx = projects.findIndex(p => p.id === currentId);
    if (idx === -1) { showStatus('Project not found.', 'error'); return; }

    // If ID changed, update currentId too
    if (updated.id !== currentId) {
        const dup = projects.find((p, i) => p.id === updated.id && i !== idx);
        if (dup) { showStatus('Another project already uses this ID.', 'error'); return; }
        currentId = updated.id;
    }

    projects[idx] = updated;
    rebuildSelect();

    fetch('http://localhost:3000/save-projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ projects })
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) showStatus('Saved! Refresh your site to see changes.', 'success');
        else         showStatus('Save failed: ' + data.error, 'error');
    })
    .catch(() => showStatus('Could not reach admin server. Is npm run admin running?', 'error'));
}

function showStatus(msg, type) {
    const bar = document.getElementById('status-bar');
    bar.textContent = msg;
    bar.className = 'status-bar ' + type;
    setTimeout(() => bar.className = 'status-bar', 8000);
}

// ── Image Upload ─────────────────────────────────────────────────────────────
let _uploadTargetField = null;

function triggerUpload(fieldId) {
    _uploadTargetField = fieldId;
    document.getElementById('file-input').value = '';
    document.getElementById('file-input').click();
}

function handleUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('file', file, file.name);
    showStatus('Uploading...', 'success');
    fetch('http://localhost:3000/upload-image', { method: 'POST', body: form })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                document.getElementById(_uploadTargetField).value = data.path;
                const previewKey = _uploadTargetField.startsWith('ss-src-') ? _uploadTargetField.replace('ss-src-', 'ss-prev-') : _uploadTargetField + '-preview';
                const previewEl = document.getElementById(previewKey);
                if (previewEl) {
                    previewEl.src = data.path;
                    previewEl.classList.add('visible');
                }
                syncPreview();
                showStatus('Image uploaded: ' + data.path, 'success');
            } else {
                showStatus('Upload failed: ' + data.error, 'error');
            }
        })
        .catch(() => showStatus('Could not reach admin server. Is npm start running?', 'error'));
}

// ── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
