<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | Zenith Design</title>
    <link rel="icon" type="image/png" href="images/zenith-logo-mark.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/case-study.css">
</head>
<body>

    <!-- ── NAV (identical to index.html) ── -->
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="nav-logo">
                <img src="images/zenith-logo-mark.png" alt="Zenith Design Logo" class="logo-img">
                <span class="logo-text">Zenith Design</span>
            </a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#works">Works</a></li>
                    <li><a href="index.html#services">Services</a></li>
                    <li><a href="index.html#approach">Approach</a></li>
                </ul>
                <a href="index.html#contact" class="nav-contact">Contact Us ↗</a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="menu">&#9776;</button>
        </nav>
    </header>

    <!-- ── CASE STUDY CONTENT (rendered by JS) ── -->
    <main id="cs-main" style="padding-top: 64px;"></main>

    <script src="projects.js"></script>
    <script>
        function renderParagraphs(text, cls) {
            if (!text) return '';
            return text.split(/\n\n+/).map(function(p) { return '<p class="' + cls + '">' + p.replace(/\n/g, '<br>') + '</p>'; }).join('');
        }
        function getLangField(p, field, lang) {
            if (lang === 'en') return p[field] || '';
            return p[field + '_' + lang] || p[field] || '';
        }

        var params = new URLSearchParams(window.location.search);
        var projectId = params.get('id');
        var project = (window.PROJECTS || []).find(function(p) { return p.id === projectId; });
        var main = document.getElementById('cs-main');

        if (!project) {
            main.innerHTML = '<div class="cs-not-found"><p>Project not found. <a href="index.html">← Back to home</a></p></div>';
        } else {
            function renderCaseStudy(lang) {
                lang = lang || localStorage.getItem('language') || 'en';
                var tag      = getLangField(project, 'tag', lang);
                var title    = getLangField(project, 'title', lang);
                var overview = getLangField(project, 'overview', lang);
                var outcome  = getLangField(project, 'outcome', lang);
                var captions = lang !== 'en' ? (project['captions_' + lang] || project.captions || []) : (project.captions || []);

                document.title = title + ' | Zenith Design';

                var screenshotsHtml = (project.screenshots || []).map(function(src, i) {
                    var cap = captions[i] || '';
                    return '<div class="cs-screenshot-item">'
                        + '<img src="' + src + '" alt="' + cap + '">'
                        + (cap ? '<p class="cs-caption">' + cap + '</p>' : '')
                        + '</div>';
                }).join('');

                main.innerHTML =
                    (project.heroImage ? '<div class="cs-hero"><img src="' + project.heroImage + '" alt="' + title + '"></div>' : '')
                    + '<div class="cs-body">'
                    + '<span class="cs-tag">' + tag + '</span>'
                    + '<h1 class="cs-title">' + title + '</h1>'
                    + renderParagraphs(overview, 'cs-overview')
                    + '<hr class="cs-divider">'
                    + '<div class="cs-screenshots">' + screenshotsHtml + '</div>'
                    + '<hr class="cs-divider">'
                    + '<span class="cs-outcome-label">Outcome</span>'
                    + '<p class="cs-outcome-text">' + outcome + '</p>'
                    + '<a href="index.html#works" class="cs-back">← Back to all projects</a>'
                    + '</div>';
            }
            window.renderCaseStudy = renderCaseStudy;
            renderCaseStudy();
        }

        // Mobile nav toggle
        var navToggle = document.getElementById('nav-toggle');
        var navLinks  = document.querySelector('.nav-links');
        navToggle.addEventListener('click', function() { navLinks.classList.toggle('open'); });
    </script>
</body>
</html>
